events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Logging format for Loki ingestion
    log_format json_loki escape=json
      '{"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_loki;
    error_log  /var/log/nginx/error.log warn;

    # Upstream Microservices
    upstream pdf_merge_split_backend {
        server 127.0.0.1:8000;
    }

    upstream pdf_to_text_backend {
        server 127.0.0.1:8001;
    }

    upstream pdf_editor_worker_backend {
        server 10.0.20.25:8002 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;
        server_name _;

        # Client body upload limit for large PDF files (up to 100MB)
        client_max_body_size 100M;

        # Frontend SPA reverse proxy
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 1. PDF Merge / Split / Extract API
        location /api/v1/pdf/merge {
            proxy_pass http://pdf_merge_split_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/pdf/split {
            proxy_pass http://pdf_merge_split_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/pdf/extract {
            proxy_pass http://pdf_merge_split_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 2. PDF to Text API
        location /api/v1/pdf/to-text {
            proxy_pass http://pdf_to_text_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. PDF Editor API (Heavy On-Demand Worker)
        location /api/v1/editor/ {
            proxy_pass http://pdf_editor_worker_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }

        # Health endpoint
        location /health {
            return 200 '{"status":"ok","gateway":"nginx-smart-router"}';
            add_header Content-Type application/json;
        }
    }
}
