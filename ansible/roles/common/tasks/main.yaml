---
- name: Update apt cache and install core system utilities
  apt:
    name:
      - curl
      - wget
      - git
      - htop
      - unzip
      - jq
      - ca-certificates
      - software-properties-common
      - python3
      - python3-pip
      - net-tools
    state: present
    update_cache: yes

- name: Create project directories
  file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  loop:
    - /opt/pdfroar
    - /opt/pdfroar/logs
    - /opt/pdfroar/config
