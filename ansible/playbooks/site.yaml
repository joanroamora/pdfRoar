---
# Master Ansible Deployment Playbook for pdfRoar Infrastructure

# 1. Common Configuration on ALL Nodes
- name: Apply Common OS Base & Tools across all instances
  hosts: all
  become: yes
  roles:
    - common
    - observability_agent

# 2. Setup Bastion Host with LGTM Observability Stack
- name: Provision Bastion Host with Docker & LGTM (Grafana, Loki, Prometheus, Tempo)
  hosts: bastion
  become: yes
  roles:
    - docker
    - lgtm_stack

# 3. Setup K3s Master Cluster Node
- name: Provision K3s Master Cluster for Frontend, Gateway, and Light Microservices
  hosts: k3s_cluster
  become: yes
  roles:
    - k3s

# 4. Setup On-Demand Heavy PDF Processing Worker
- name: Provision On-Demand Heavy PDF Worker (PyMuPDF Engine + Auto-Shutdown)
  hosts: pdf_worker
  become: yes
  roles:
    - docker
    - pdf_worker
